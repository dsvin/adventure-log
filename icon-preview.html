<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { background: #111; font-family: sans-serif; color: #fff; padding: 60px; display: flex; flex-direction: column; align-items: center; gap: 50px; }
  h1 { color: #e6c463; letter-spacing: .2em; font-size: 16px; }
  .row { display: flex; gap: 50px; align-items: flex-end; }
  .box { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .label { color: #9a9486; font-size: 12px; letter-spacing: .1em; text-transform: uppercase; }
</style>
</head>
<body>
<h1>ADVENTURE LOG — ICON PREVIEW</h1>
<div class="row">
  <!-- Large preview -->
  <div class="box">
    <img src="icon-source.svg" width="256" height="256" style="border-radius:50px"/>
    <span class="label">256 × 256</span>
  </div>
  <!-- Medium -->
  <div class="box">
    <img src="icon-source.svg" width="128" height="128" style="border-radius:25px"/>
    <span class="label">128 × 128</span>
  </div>
  <!-- Taskbar size -->
  <div class="box">
    <img src="icon-source.svg" width="48" height="48" style="border-radius:10px"/>
    <span class="label">48 × 48</span>
  </div>
  <!-- Small -->
  <div class="box">
    <img src="icon-source.svg" width="32" height="32" style="border-radius:6px"/>
    <span class="label">32 × 32</span>
  </div>
  <!-- Tiny -->
  <div class="box">
    <img src="icon-source.svg" width="16" height="16" style="border-radius:3px"/>
    <span class="label">16 × 16</span>
  </div>
</div>
<p style="color:#5f5b50; font-size:13px; font-style:italic">Amber guard · Cyan gem · Ember blade edge</p>
</body>
</html>
